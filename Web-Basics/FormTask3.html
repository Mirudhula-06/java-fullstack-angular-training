<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>

<body bgcolor="grey">

<center>
<h1>Student Registration Form</h1>
</center>

<form>

<table align="center" cellpadding="8">

<tr>
    <td>Roll no. :</td>
    <td><input type="text" size="35"></td>
</tr>

<tr>
    <td>Student name :</td>
    <td>
        <input type="text" placeholder="First Name" size="15">
        -
        <input type="text" placeholder="Last Name" size="15">
    </td>
</tr>

<tr>
    <td>Father's name :</td>
    <td><input type="text" size="35"></td>
</tr>

<tr>
    <td>Date of birth :</td>
    <td>
        <input type="text" placeholder="Day" size="4"> -
        <input type="text" placeholder="Month" size="6"> -
        <input type="text" placeholder="Year" size="6">
        (DD-MM-YYYY)
    </td>
</tr>

<tr>
    <td>Mobile no. :</td>
    <td>
        <input type="text" value="+91" size="3"> -
        <input type="text" size="25">
    </td>
</tr>

<tr>
    <td>Email id :</td>
    <td><input type="email" size="35"></td>
</tr>

<tr>
    <td>Password :</td>
    <td><input type="password" size="35"></td>
</tr>

<tr>
    <td>Gender :</td>
    <td>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </td>
</tr>

<tr>
    <td>Department :</td>
    <td>
        <input type="checkbox"> CSE
        <input type="checkbox"> IT
        <input type="checkbox"> ECE
        <input type="checkbox"> Civil
        <input type="checkbox"> Mech
    </td>
</tr>

<tr>
    <td>Course :</td>
    <td>
        <select>
            <option>------------- Select Current Courses -------------</option>
            <option>Computer Basics</option>
            <option>Python</option>
            <option>Java</option>
            <option>DAA</option>
        </select>
    </td>
</tr>

<tr>
    <td>Student photo :</td>
    <td><input type="file"></td>
</tr>

<tr>
    <td>City :</td>
    <td><input type="text" size="35"></td>
</tr>

<tr>
    <td>Address :</td>
    <td><textarea rows="4" cols="30"></textarea></td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Register">
    </td>
</tr>

</table>

</form>

</body>
</html>
