<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* internal css is a type of CSS where the styles are defined within the <style> tag in the head section of an HTML document. */
        #myHeading{
            background-color: rgb(0, 248, 210);
        }
        .myHeading{
            color: red;
            font-size: 20px;
        }
        h3{
            color: green;
            font-size: 30px;
        }
        h4,h3{
            font-style: italic;
        }
        *
       {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>

</head>
<body>
    <h1 id="myHeading">hello im styled with id</h1>
    <h2 class="myHeading">hello im styled with class</h2>
    <h3>hello im styles with tag</h3>
    <h4>hi i'm styled with group id</h4>
</body>
</html>
