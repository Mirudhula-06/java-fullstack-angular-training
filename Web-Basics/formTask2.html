<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form action="">
        <label for="fname" >First Name:</label>
        <input type="text" id="fname" placeholder="Enter your first name" name="First Name:" required>
        <br>
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" required name="Last Name:" placeholder="Enter Last Name">
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email"  required name="Email:" placeholder="Enter Email Address">
        <br>
        <label for="pswd">Password:</label>
        <input type="password" id="pswd" required name="Password:" placeholder="Enter Password">
        <br>
        <label for="gender">Gender:</label>
        <br>
        <label for="male">Male</label>
        <input type="radio" id="male" name="Gender:" value="male">
        <br>
        <label for="female">Female</label>
        <input type="radio" id="female" name="Gender:" value="female">
        <br>
        <label for="other">Other</label>
        <input type="radio" id="other" name="Gender:" value="other">
        <br>
        <label for="age">Age:</label>
         <input type="number" id="age" name="Age:" min="0" max="120">
        <br>
        <label for="preference">Preferences:</label>
        <br>
        <label for="paint">Acrylic Painting</label>
        <input type="checkbox" id="paint" name="Preferences:" value="painting">
        <br>
        <label for="oilpaint">Oil Painting</label>
        <input type="checkbox" id="oilpaint" name="Preferences:" value="oilpainting">
        <br>
        <label for="watercolour">Water Colour Painting</label>
        <input type="checkbox" id="watercolour" name="Preferences:" value="watercolour">
        <br>
        <label for="occupation">Select Occupation:</label>
        <select id="occupation" name="Select Occupation:" checked="true">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="artist">Artist</option>
        </select>
        <br>
        <label for="bio">Bio</label>
        <textarea id="bio" name="Bio" rows="5" cols="25" placeholder="Share few lines about yourself.."></textarea>
        <br>
        <button type="reset">Reset</button>
        <button type="submit">Register</button>
    </form>
</body>
</html>
