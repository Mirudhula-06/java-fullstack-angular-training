<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* internal css is a type of CSS where the styles are defined within the <style> tag in the head section of an HTML document. */
        h1{
            background-color: rgb(0, 248, 210);
        }
        p{
            color: red;
            font-size: 20px;
        }
    </style>
    <title>Document</title>

</head>
<body>
    <h1>Hello, World!</h1>
    <p>This is a paragraph without any CSS styling.</p>
    <p></p>

</body>
</html>
