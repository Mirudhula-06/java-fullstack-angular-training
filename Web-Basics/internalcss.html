<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* internal css is a type of CSS where the styles are defined within the <style> tag in the head section of an HTML document. */
        h1{
            color:blue;
            background-color:yellow;
        }
        h3{
            color:green;
            background-color:lightgray;
        }
    </style>
</head>
<body>
    <h1>hello</h1>
    <h3>this is the example of internal CSS</h3>



</body>
</html>
