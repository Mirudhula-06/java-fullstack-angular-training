<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- inline css is a type where CSS is applied directly to an HTML element using the style attribute -->
    <h1 style="background-color: rgb(0, 248, 210);">Hello, World!</h1>
    <p style="color: red; font-size: 20px;">This is a paragraph with inline CSS.</p>

    
</body>
</html>
