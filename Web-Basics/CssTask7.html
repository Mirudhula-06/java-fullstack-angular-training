<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       #p1{
        background-color: yellow;
        padding: 0%;
        border-style: dashed;
       }
       #p2
       {
        border: 3px solid black;
        padding: 0%;
        background-color: olive;
       }
       #p3{
        border: 3px solid red;
        padding: 10px;
        background-color: aqua;
       }
       #img1
       {
       
       height: 200px;
       width: 260px;
          border: 4px solid black;
        padding: 7px;
        background-color: white;
       }
       #img2
       {
        height: 194px;
        width: 260px;
        border: 4px solid black;
        padding: 7px;
        background-color: yellow;
       }
       #img3
       {
        height: 198px;
        width: 260px;
        border: 2px solid black;
        padding: 7px;
        background-color: cadetblue;
       }
    </style>
</head>
<body>
    <h1><strong>The Box Model</strong></h1>
    <h3>Looking at Text</h3>
    <p id="p1">A paragraph with dashed black border,no padding, and a yellow background</p>
    <p id="p2">A paragraph with thick black border,no padding, and an olive background</p>
    <p id="p3">a paragraph with thick solid red border, 1 pixel padding, and an aqua background</p>
    <h1>Looking At Images</h1>
    <img src="./assets/scenario1.jpeg" alt="" id="img1">
    <img src="./assets/scenario2.jpeg" alt="" id="img2">
    <img src="./assets/scenario2.jpeg" alt="" id="img3">
</body>
</html>
